<!DOCTYPE html>
<html>
<head>
    <title>Messages Dashboard | Jatin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 800px; margin: 50px auto;">
        <h1>📩 Admin Dashboard</h1>
        <p>Real-time messages from your portfolio.</p>
        <hr>
        <div id="messages-list">Loading your leads...</div>
    </div>

   <script>
    // 1. Prompt for password as soon as the page loads
    const adminKey = prompt("Enter Admin Password to view messages:");

    async function fetchMessages() {
        try {
            const res = await fetch('/.netlify/functions/get-messages', {
                // ADDING THE SECURITY HEADER HERE
                headers: { 'x-admin-password': adminKey }
            });
            
            if (res.status === 401) {
                document.getElementById('messages-list').innerHTML = "❌ Access Denied: Incorrect Password.";
                return;
            }

            const data = await res.json();
            const list = document.getElementById('messages-list');
            
            if (data.length === 0) {
                list.innerHTML = "<p>No messages yet!</p>";
                return;
            }

            list.innerHTML = data.map(m => `
                <div style="background: #fff; border: 1px solid #ddd; border-left: 5px solid #008ca3; margin: 15px 0; padding: 15px; border-radius: 5px; position: relative; text-align: left; color: #333;">
                    <button onclick="deleteMessage(${m.id})" style="position: absolute; right: 15px; top: 15px; background: #ff4d4d; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 5px 10px; font-size: 12px;">Delete</button>
                    <strong>${m.name}</strong> (${m.email})<br>
                    <p>${m.message}</p>
                    <small>${new Date(m.created_at).toLocaleString()}</small>
                </div>
            `).join('');
        } catch (err) {
            document.getElementById('messages-list').innerHTML = "⚠️ Error loading messages.";
        }
    }

    async function deleteMessage(id) {
        if (!confirm("Delete forever?")) return;

        try {
            const res = await fetch('/.netlify/functions/delete-message', {
                method: 'DELETE',
                headers: { 
                    'Content-Type': 'application/json',
                    // ADDING THE SECURITY HEADER HERE TOO
                    'x-admin-password': adminKey 
                },
                body: JSON.stringify({ id })
            });

            if (res.ok) { fetchMessages(); } 
            else { alert("Delete failed. Check password."); }
        } catch (err) { console.error(err); }
    }

    fetchMessages();
</script>
</body>
</html>
