<!DOCTYPE html>
<html>
<head>
    <title>Messages Dashboard | Jatin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 800px; margin: 50px auto; color: white;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1 style="margin: 0;">📩 Admin Dashboard</h1>
        <button id="logoutbtn" class="admin-btn" onclick="handleLogout()" 
                style="background: #ff4b2b; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;">
            Logout
        </button>
    </div>

    <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #444; text-align: left;">
        <h3 style="margin: 0; font-size: 16px; color: #aaa;">Total Messages Captured: 
            <span id="message-count" style="color: #008ca3; font-size: 26px; margin-left: 10px;">0</span>
        </h3>
    </div>

    <p style="color: #ccc;">Real-time messages from your portfolio.</p>
    <hr style="border: 0; border-top: 1px solid #444; margin-bottom: 30px;">

    <div id="messages-list">Loading your leads...</div>
</div>

   <script>
   // 1. Check if the password is already saved in the browser
let adminKey = localStorage.getItem('adminKey');

// 2. If it's NOT saved, ask the user for it
if (!adminKey) {
    adminKey = prompt("Enter Admin Password to view messages:");
    if (adminKey) {
        // 3. Save it so you don't have to type it again on refresh
        localStorage.setItem('adminKey', adminKey);
    }
}

    async function fetchMessages() {
        try {
            const res = await fetch('/.netlify/functions/get-messages', {
                // ADDING THE SECURITY HEADER HERE
                headers: { 'x-admin-password': adminKey }
            });
            
            if (res.status === 401) {
                document.getElementById('messages-list').innerHTML = "❌ Access Denied: Incorrect Password.";
                return;
            }

            const data = await res.json();
            const list = document.getElementById('messages-list');
            document.getElementById('message-count').innerText = data.length;
            
            if (data.length === 0) {
                list.innerHTML = "<p>No messages yet!</p>";
                return;
            }

            list.innerHTML = data.map(m => `
                <div style="background: #fff; border: 1px solid #ddd; border-left: 5px solid #008ca3; margin: 15px 0; padding: 15px; border-radius: 5px; position: relative; text-align: left; color: #333;">
                    <button onclick="deleteMessage(${m.id})" style="position: absolute; right: 15px; top: 15px; background: #ff4d4d; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 5px 10px; font-size: 12px;">Delete</button>
                    <strong>${m.name}</strong> (${m.email})<br>
                    <p>${m.message}</p>
                    <small>${new Date(m.created_at).toLocaleString()}</small>
                </div>
            `).join('');
        } catch (err) {
            document.getElementById('messages-list').innerHTML = "⚠️ Error loading messages.";
        }
    }


fetchMessages();
function handleLogout() {
    localStorage.clear(); 
    alert("Session ended. Redirecting...");
    window.location.href = "index.html";
   
    
}

</script>
</body>
</html>
