<!DOCTYPE html>
<html>
<head>
    <title>Messages Dashboard | Jatin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 800px; margin: 50px auto;">
        <h1>📩 Admin Dashboard</h1>
        <p>Real-time messages from your portfolio.</p>
        <hr>
        <div id="messages-list">Loading your leads...</div>
    </div>

    <script>
    // 1. Function to Fetch and Display Messages
    async function fetchMessages() {
        try {
            const res = await fetch('/.netlify/functions/get-messages');
            const data = await res.json();
            const list = document.getElementById('messages-list');
            
            if (data.length === 0) {
                list.innerHTML = "<p>No messages yet! Your inbox is clean.</p>";
                return;
            }

            list.innerHTML = data.map(m => `
                <div style="background: #fff; border: 1px solid #ddd; border-left: 5px solid #008ca3; margin: 15px 0; padding: 15px; border-radius: 5px; position: relative; text-align: left; color: #333;">
                    <button onclick="deleteMessage(${m.id})" style="position: absolute; right: 15px; top: 15px; background: #ff4d4d; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 5px 10px; font-size: 12px;">Delete</button>
                    <strong style="font-size: 1.1em;">${m.name}</strong> 
                    <span style="color: #666;">(${m.email})</span><br>
                    <p style="margin: 10px 0;">${m.message}</p>
                    <small style="color: #999;">${new Date(m.created_at).toLocaleString()}</small>
                </div>
            `).join('');
        } catch (err) {
            document.getElementById('messages-list').innerHTML = "⚠️ Error loading messages.";
        }
    }

    // 2. Function to Delete a Message
    async function deleteMessage(id) {
        if (!confirm("Are you sure you want to delete this message forever?")) return;

        try {
            const res = await fetch('/.netlify/functions/delete-message', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id })
        });//make sure this line is clean

            if (res.ok) {
                fetchMessages(); // This re-runs the list to show it's gone
            } else {
                alert("Failed to delete.");
            }
        } catch (err) {
            console.error("Delete error:", err);
        }
    }

    // This calls the function once when the page opens
    fetchMessages();
</script>
</body>
</html>
