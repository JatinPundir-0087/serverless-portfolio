<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jatin | Cloud & Software Engineer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Jatin Pundir</h1>
        <p>B.Tech CSE Student</p>
    </header>

    <section id="about">
        <h2>About Me</h2>
        <p>Aspiring Cloud Engineer focused on Serverless Architectures and AWS.</p>
    </section>

    <section id="contact">
        <h2>Contact Me</h2>
        <form id="contact-form">
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="email" id="email" placeholder="Your Email" required>
            <textarea id="message" placeholder="Your Message"></textarea>
            <button type="submit">Send via Serverless API</button>
        </form>
    </section>

    <script src="script.js">
        
    // This silently calls your function to add +1 to the database 
    // whenever someone lands on your homepage
    window.addEventListener('load', () => {
        fetch('/.netlify/functions/get-analytics')
            .then(res => res.json())
            .then(data => console.log('Visit tracked!'))
            .catch(err => console.error('Analytics error:', err));
    });

    </script>
</body>
</html>
